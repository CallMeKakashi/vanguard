name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build Web
        run: npm run build
      - name: Build Electron (Linux)
        run: npm run electron:build -- --linux --publish never
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist-electron-build/*.AppImage
            dist-electron-build/*.deb
            dist-electron-build/*.rpm
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build Web
        run: npm run build
      - name: Build Electron (Windows)
        run: npm run electron:build -- --win --publish never
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: dist-electron-build/*.zip
          retention-days: 1

  build-mac:
    if: ${{ !contains(github.ref, '-') }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build Web
        run: npm run build
      - name: Build Electron (Mac)
        run: npm run electron:build -- --mac --publish never
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-artifacts
          path: |
            dist-electron-build/*.dmg
            dist-electron-build/*.zip
          retention-days: 1

  release:
    needs: [build-linux, build-windows, build-mac]
    if: always() && !cancelled() && needs.build-linux.result == 'success' && needs.build-windows.result == 'success' && (needs.build-mac.result == 'success' || needs.build-mac.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
